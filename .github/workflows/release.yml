name: Release

# Tag-driven release: pushing an X.Y.Z tag builds the wheel + sdist and publishes
# them to PyPI via OIDC "trusted publishing" (no API token stored in the repo).
# Pre-requisite (one-time): register this repo + the `release.yml` workflow as a
# trusted publisher for the project on PyPI, and create a `pypi` environment.
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*" # pre-releases, e.g. 1.2.0-rc.1

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Fail fast if the tag and [project].version disagree, so we never publish a
      # mislabelled artifact (logic is unit-tested in test_check_release_version.py).
      - name: Verify tag matches package version
        run: python scripts/check_release_version.py

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
